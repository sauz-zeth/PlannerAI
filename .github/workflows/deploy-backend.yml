name: Deploy Backend

on:
  push:
    branches: ['backend', 'develop/backend']

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd ~/AI-planner

            # Определяем ветку из GitHub ref
            BRANCH="${{ github.ref_name }}"
            echo "Deploying branch: $BRANCH"

            # Обновляем код из репозитория
            git fetch origin
            git checkout $BRANCH 2>/dev/null || git checkout -b $BRANCH origin/$BRANCH
            git pull origin $BRANCH

            # Определяем команду docker compose (может быть docker-compose или docker compose)
            if command -v docker-compose &> /dev/null; then
              DOCKER_COMPOSE="docker-compose"
            else
              DOCKER_COMPOSE="docker compose"
            fi

            # Собираем backend образ
            $DOCKER_COMPOSE build backend 2>/dev/null || \
              docker build -f backend_service/Dockerfile -t planner-backend .

            # Останавливаем и удаляем старый контейнер backend (если запущен)
            $DOCKER_COMPOSE stop backend 2>/dev/null || true
            $DOCKER_COMPOSE rm -f backend 2>/dev/null || true
            docker stop planner-backend 2>/dev/null || true
            docker rm planner-backend 2>/dev/null || true

            # Запускаем backend через compose
            $DOCKER_COMPOSE up -d --no-deps backend

            # Ждем запуска и проверяем статус контейнера
            sleep 5

            # Проверяем логи на ошибки
            echo "=== Container logs ==="
            $DOCKER_COMPOSE logs --tail=50 backend || docker logs planner-backend 2>/dev/null || true

            # Проверяем статус контейнера
            echo "=== Container status ==="
            $DOCKER_COMPOSE ps backend || docker ps -a | grep planner-backend || true

            # Проверяем здоровье сервиса (несколько попыток)
            echo "=== Health check ==="
            for i in {1..5}; do
              if curl -f http://localhost:8000/health 2>/dev/null; then
                echo "Backend is healthy!"
                exit 0
              fi
              echo "Attempt $i failed, waiting..."
              sleep 2
            done

            echo "Health check failed after 5 attempts"
            exit 1
