version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: backend_service/Dockerfile
    working_dir: /app
    volumes:
      - ./:/app
    command: >
      bash -c "
      uv pip install --system -r requirements.txt &&
      uvicorn backend_service.main:app --host 0.0.0.0 --port 8000
      "
    env_file:
      - .env
    ports:
      - "8000:8000"

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /app
    volumes:
      - ./:/app
    command: python -m bot_service.main
    env_file:
      - .env
    depends_on:
      - backend