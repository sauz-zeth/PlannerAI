version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: backend_service/Dockerfile
    env_file:
      - .env
    ports:
      - "8000:8000"
    restart: unless-stopped

  bot:
    build:
      context: .
      dockerfile: bot_service/Dockerfile
    env_file:
      - .env
    depends_on:
      - backend
    restart: unless-stopped
