version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: backend_service/Dockerfile
    command: >
      uvicorn backend_service.main:app --host 0.0.0.0 --port 8000
    env_file:
      - .env
    environment:
      - LM_STUDIO_BASE_URL=${LM_STUDIO_BASE_URL:-http://host.docker.internal:1234/v1}
      - LM_STUDIO_MODEL=${LM_STUDIO_MODEL:-qwen/qwen3-4b-2507}
    ports:
      - "8000:8000"

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    command: >
      python -m bot_service.main
    env_file:
      - .env
    environment:
      - BACKEND_SERVICE_URL=http://backend:8000
    depends_on:
      - backend

