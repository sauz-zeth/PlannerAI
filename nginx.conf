# Nginx конфигурация для backend (опционально)
# Разместите этот файл в /etc/nginx/sites-available/ai-planner-backend
# и создайте симлинк: ln -s /etc/nginx/sites-available/ai-planner-backend /etc/nginx/sites-enabled/

upstream backend {
    server 127.0.0.1:8000;
}

server {
    listen 80;
    server_name your-domain.com;  # Замените на ваш домен или IP

    # Логи
    access_log /var/log/nginx/ai-planner-backend-access.log;
    error_log /var/log/nginx/ai-planner-backend-error.log;

    # Максимальный размер тела запроса
    client_max_body_size 10M;

    location / {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Таймауты для долгих запросов
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Health check endpoint
    location /health {
        proxy_pass http://backend/health;
        access_log off;
    }
}

